<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Stream | Watch Free Licensed Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main-cyan: #ffdd95; --bg-dark: #121212; --card-bg: #1f1f1f; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; }
        .sidebar { width: 80px; transition: width 0.3s; }
        .sidebar:hover { width: 240px; }
        .anime-card:hover .play-overlay { opacity: 1; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar h-screen sticky top-0 bg-[#0a0a0a] border-r border-white/10 flex flex-col items-center py-6 overflow-hidden z-50">
        <div class="mb-10 text-2xl font-bold text-[#ffdd95]">Hi</div>
        <nav class="flex flex-col gap-8 w-full px-6">
            <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-[#ffdd95]"><i class="fa fa-home text-xl"></i> <span class="whitespace-nowrap">Home</span></a>
            <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-[#ffdd95]"><i class="fa fa-fire text-xl"></i> <span class="whitespace-nowrap">Trending</span></a>
            <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-[#ffdd95]"><i class="fa fa-list text-xl"></i> <span class="whitespace-nowrap">My List</span></a>
            <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-[#ffdd95]"><i class="fa fa-random text-xl"></i> <span class="whitespace-nowrap">Random</span></a>
        </nav>
    </aside>

    <main class="flex-1">
        <nav class="p-4 flex justify-between items-center bg-black/20 backdrop-blur-md">
            <div class="relative w-1/3">
                <input type="text" placeholder="Search anime..." class="w-full bg-[#2a2a2a] py-2 px-10 rounded-lg border border-transparent focus:border-[#ffdd95] outline-none">
                <i class="fa fa-search absolute left-3 top-3 text-gray-500"></i>
            </div>
            <div class="flex items-center gap-4">
                <button class="bg-[#ffdd95] text-black font-bold px-4 py-1 rounded">JOIN DISCORD</button>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-500"></div>
            </div>
        </nav>

        <section class="relative h-[60vh] w-full p-8">
            <div class="absolute inset-0 rounded-3xl m-8 overflow-hidden">
                <img src="https://images7.alphacoders.com/133/1337424.jpg" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#121212] via-transparent to-transparent"></div>
                <div class="absolute bottom-10 left-10">
                    <h2 class="text-6xl font-black italic uppercase mb-2">Attack on Titan</h2>
                    <p class="text-gray-300 mb-4 max-w-lg">Final Season: The Final Chapters are here. Witness the end of the journey.</p>
                    <button class="bg-[#ffdd95] text-black px-8 py-3 rounded-full font-bold hover:scale-105 transition flex items-center gap-2">
                        <i class="fa fa-play"></i> WATCH NOW
                    </button>
                </div>
            </div>
        </section>

        <section class="px-8 pb-20">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-1 h-6 bg-[#ffdd95]"></span> Trending
            </h3>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <div class="anime-card relative rounded-lg overflow-hidden group cursor-pointer">
                    <img src="https://m.media-amazon.com/images/M/MV5BNDFjYTIxMjctYTQ2ZC00OGQ4LWE3OGYtNDdiMzNiNDEzZDc3XkEyXkFqcGdeQXVyMTEzMTI1Mjk3._V1_.jpg" class="w-full h-64 object-cover">
                    <div class="play-overlay absolute inset-0 bg-black/60 opacity-0 transition flex items-center justify-center">
                        <i class="fa fa-play-circle text-5xl text-[#ffdd95]"></i>
                    </div>
                    <div class="absolute top-2 left-2 bg-[#ffdd95] text-black text-[10px] font-bold px-2 py-0.5 rounded">EP 12/12</div>
                    <p class="p-2 text-sm font-medium truncate">Solo Leveling</p>
                </div>
                </div>
        </section>
    </main>
</body>
</html>
